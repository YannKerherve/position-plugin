<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windy Ship Position — Configuration Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --red: #e53935;
    --red-dark: #b71c1c;
    --red-glow: rgba(229,57,53,0.12);
    --dark: #111214;
    --surface: #1a1c1f;
    --surface2: #22252a;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(229,57,53,0.4);
    --text: #f0f0f0;
    --text-muted: #8a8f9a;
    --teal: #1D9E75;
    --amber: #EF9F27;
    --font-display: 'Barlow Condensed', sans-serif;
    --font-body: 'Barlow', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: var(--dark);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(229,57,53,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(229,57,53,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none; z-index: 0;
  }
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(17,18,20,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-brand {
    font-family: var(--font-display);
    font-size: 20px; font-weight: 700; letter-spacing: 1px;
    color: var(--text); text-decoration: none;
    display: flex; align-items: center; gap: 8px;
  }
  .nav-brand i { color: var(--red); }
  .nav-links { display: flex; gap: 8px; }
  .nav-links a {
    font-size: 12px; font-weight: 600; letter-spacing: 0.8px;
    text-transform: uppercase; color: var(--text-muted);
    text-decoration: none; padding: 6px 12px;
    border: 1px solid transparent; border-radius: 4px;
    transition: all 0.2s;
  }
  .nav-links a:hover { color: var(--text); border-color: var(--border); }
  .hero {
    position: relative; z-index: 1;
    padding: 5rem 2rem 3rem; text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .hero-badge {
    display: inline-block;
    font-size: 11px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--red);
    border: 1px solid rgba(229,57,53,0.3);
    padding: 5px 16px; border-radius: 100px; margin-bottom: 1.5rem;
    animation: fadeUp 0.5s ease both;
  }
  .hero h1 {
    font-family: var(--font-display);
    font-size: clamp(2.5rem, 7vw, 5rem);
    font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; line-height: 1;
    animation: fadeUp 0.5s 0.1s ease both;
  }
  .hero h1 span { color: var(--red); }
  .hero p {
    font-size: 17px; color: var(--text-muted);
    margin-top: 1rem; max-width: 500px; margin-inline: auto;
    animation: fadeUp 0.5s 0.2s ease both;
  }
  .hero-scroll {
    margin-top: 2.5rem;
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--red); font-size: 13px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    text-decoration: none;
    animation: fadeUp 0.5s 0.3s ease both;
  }
  .hero-scroll i { animation: bounce 1.5s ease infinite; }
  main {
    position: relative; z-index: 1;
    max-width: 760px; margin: 0 auto;
    padding: 3rem 1.5rem 6rem;
  }
  .progress-wrap {
    display: flex; align-items: center; gap: 12px; margin-bottom: 2rem;
  }
  .progress-track {
    flex: 1; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--red); border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .progress-label { font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.5px; white-space: nowrap; }
  .breadcrumb {
    display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
    margin-bottom: 1.5rem; min-height: 20px;
  }
  .bc-item { font-size: 12px; color: var(--text-muted); cursor: pointer; transition: color 0.2s; }
  .bc-item:hover { color: var(--red); }
  .bc-sep { font-size: 12px; color: #333; }
  .bc-cur { font-size: 12px; color: var(--red); font-weight: 600; }
  .step-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 2rem;
    animation: fadeUp 0.35s ease both;
    position: relative; overflow: hidden;
  }
  .step-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--red); border-radius: 12px 12px 0 0;
  }
  .step-card.success::before { background: var(--teal); }
  .step-card.contact::before { background: var(--amber); }
  .step-badge-inner {
    font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--red); margin-bottom: 10px; display: block;
  }
  .step-card.success .step-badge-inner { color: var(--teal); }
  .step-card.contact .step-badge-inner { color: var(--amber); }
  .step-title {
    font-family: var(--font-display);
    font-size: 26px; font-weight: 700; letter-spacing: 1px;
    color: var(--text); line-height: 1.1; margin-bottom: 0.5rem;
  }
  .step-desc { font-size: 15px; color: var(--text-muted); margin-bottom: 1.25rem; line-height: 1.6; }
  .step-info {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--red);
    border-radius: 0 8px 8px 0;
    padding: 14px 16px;
    font-size: 14px; color: var(--text-muted);
    line-height: 1.8; margin-bottom: 1.5rem;
  }
  .step-card.success .step-info { border-left-color: var(--teal); }
  .step-card.contact .step-info { border-left-color: var(--amber); }
  .step-info strong { color: var(--text); font-weight: 600; }
  .step-info em { color: var(--red); font-style: normal; font-weight: 500; }
  .step-info .path {
    display: inline-block;
    background: rgba(229,57,53,0.08);
    border: 1px solid rgba(229,57,53,0.2);
    border-radius: 4px; padding: 3px 8px;
    font-size: 12px; font-family: monospace;
    color: #ccc; margin: 6px 0; line-height: 1.6;
  }
  .step-info ol { padding-left: 1.3rem; margin-top: 6px; }
  .step-info ol li { margin-bottom: 5px; }
  .choices { display: flex; flex-direction: column; gap: 8px; }
  .choice-btn {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px;
    cursor: pointer; text-align: left;
    color: var(--text); width: 100%;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    position: relative; overflow: hidden;
  }
  .choice-btn::after {
    content: ''; position: absolute; inset: 0;
    background: var(--red-glow); opacity: 0; transition: opacity 0.2s;
  }
  .choice-btn:hover { border-color: var(--border-hover); transform: translateX(3px); }
  .choice-btn:hover::after { opacity: 1; }
  .choice-btn:active { transform: translateX(2px) scale(0.99); }
  .choice-btn.disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }
  .choice-btn.disabled::after { display: none; }
  .choice-icon {
    width: 38px; height: 38px; border-radius: 8px;
    background: rgba(229,57,53,0.1);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .choice-icon i { font-size: 16px; color: var(--red); }
  .choice-text { flex: 1; }
  .choice-label { font-size: 15px; font-weight: 600; color: var(--text); }
  .choice-sub { font-size: 13px; color: var(--text-muted); margin-top: 1px; }
  .choice-arrow { color: #444; font-size: 14px; flex-shrink: 0; transition: color 0.2s; }
  .choice-btn:hover .choice-arrow { color: var(--red); }
  .soon-badge {
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: #555;
    background: #2a2a2a; padding: 3px 8px; border-radius: 100px; flex-shrink: 0;
  }
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500; color: var(--text-muted);
    background: none; border: none; cursor: pointer;
    padding: 0; margin-top: 1.25rem; transition: color 0.2s;
  }
  .back-btn:hover { color: var(--text); }
  .restart-btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600; letter-spacing: 0.5px;
    text-transform: uppercase; color: var(--text-muted);
    background: none; border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 20px; cursor: pointer; margin-top: 1rem; transition: all 0.2s;
  }
  .restart-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  footer {
    position: relative; z-index: 1;
    border-top: 1px solid var(--border);
    padding: 2.5rem; text-align: center;
    color: var(--text-muted); font-size: 13px;
  }
  footer span { color: var(--red); font-weight: 600; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(5px); }
  }
  @media (max-width: 600px) {
    .nav-links { display: none; }
    .hero { padding: 3rem 1.25rem 2rem; }
    .step-card { padding: 1.5rem; }
    .step-title { font-size: 22px; }
  }
</style>
</head>

<nav>
  <a class="nav-brand" href="#"><i class="fas fa-wind"></i> WINDY SHIP POSITION</a>

      { icon: "fas fa-check-circle",  label: "It's working!",                  sub: "Position appears on Windy",      next: "s5_ok"      },
      { icon: "fas fa-laptop-code",   label: "I need third-party software",    sub: "OpenCPN, Adrena, etc.",           next: "s6"         },
      { icon: "fas fa-times-circle",  label: "It's not working",               sub: "Contact the developer",           next: "s7_contact" }
    ]
  }

};

let history = [];
let current = "s1";

function render(id) {
  const step = steps[id];
  if (!step) return;

  document.getElementById('progress-fill').style.width = (step.progress || 10) + '%';
  document.getElementById('progress-label').textContent = step.badge;

  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = history.map((h, i) => {
    const s = steps[h];
    const short = s.badge.split(' / ')[1] || s.badge.split(' / ')[0];
    return `<span class="bc-item" onclick="jumpTo(${i})">${short}</span><span class="bc-sep">›</span>`;
  }).join('') + `<span class="bc-cur">${step.badge.split(' / ')[1] || step.badge.split(' / ')[0]}</span>`;

  let cardClass = 'step-card';
  if (step.isSuccess) cardClass += ' success';
  else if (step.isContact) cardClass += ' contact';

  let html = `<div class="${cardClass}">
    <span class="step-badge-inner">${step.badge}</span>
    <h2 class="step-title">${step.title}</h2>`;

  if (step.desc) html += `<p class="step-desc">${step.desc}</p>`;
  if (step.info) html += `<div class="step-info">${step.info}</div>`;

  if (step.choices && !step.isEnd) {
    html += `<div class="choices">`;
    step.choices.forEach(c => {
      if (c.disabled) {
        html += `<button class="choice-btn disabled" disabled>
          <div class="choice-icon"><i class="${c.icon}"></i></div>
          <div class="choice-text">
            <div class="choice-label">${c.label}</div>
            ${c.sub ? `<div class="choice-sub">${c.sub}</div>` : ''}
          </div>
          <span class="soon-badge">Coming soon</span>
        </button>`;
      } else {
        html += `<button class="choice-btn" onclick="goTo('${c.next}')">
          <div class="choice-icon"><i class="${c.icon}"></i></div>
          <div class="choice-text">
            <div class="choice-label">${c.label}</div>
            ${c.sub ? `<div class="choice-sub">${c.sub}</div>` : ''}
          </div>
          <i class="fas fa-chevron-right choice-arrow"></i>
        </button>`;
      }
    });
    html += `</div>`;
  }

  if (step.isEnd) {
    html += `<button class="restart-btn" onclick="restart()">
      <i class="fas fa-redo"></i> Start over from the beginning
    </button>`;
  }

  html += `</div>`;

  if (history.length > 0) {
    html += `<button class="back-btn" onclick="goBack()">
      <i class="fas fa-arrow-left"></i> Back
    </button>`;
  }

  const container = document.getElementById('step-container');
  container.innerHTML = html;
  const card = container.querySelector('.step-card');
  card.style.animation = 'none';
  requestAnimationFrame(() => { card.style.animation = 'fadeUp 0.35s ease both'; });
}

function goTo(id) {
  history.push(current);
  current = id;
  render(current);
  window.scrollTo({ top: document.getElementById('wizard').offsetTop - 80, behavior: 'smooth' });
}

function goBack() {
  if (history.length > 0) { current = history.pop(); render(current); }
}

function jumpTo(index) {
  current = history[index];
  history = history.slice(0, index);
  render(current);
}

function restart() {
  history = []; current = 's1'; render(current);
  window.scrollTo({ top: document.getElementById('wizard').offsetTop - 80, behavior: 'smooth' });
}

render('s1');
</script>
</body>
</html>
